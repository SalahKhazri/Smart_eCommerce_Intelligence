name: Smart eCommerce CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Check Python syntax (important pour ML pipeline)
      - name: Compile Python files
        run: |
          python -m compileall .

      # 5. Run Kubeflow pipeline validation (important pour ton projet)
      - name: Test ML pipeline compilation
        run: |
          python ml_pipeline_kubeflow/compile_pipeline.py